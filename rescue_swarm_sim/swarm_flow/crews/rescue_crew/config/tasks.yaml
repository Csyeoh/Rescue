searching_task:
  description: >
    PHASE: SEARCHING Protocol for {drone_id}.
    1. SCAN: Call `thermal_scan("{drone_id}")`.
    2. INTEL: Call `get_drone_context("{drone_id}")`.
    3. TARGET: Decide target (thermal_memory first, then priority list).
    4. VIABILITY: Call `check_task_viability` for the target.
    5. SAFETY: If NOT viable, set status to RETURNING.
    6. NAVIGATION: Call `get_navigation_step` for the move.
    7. FINAL ACTION: Output the intent as valid JSON.
    
    CRITICAL: Your final answer MUST be a valid JSON object. Use double quotes.
    Example: {{"drone_id": "{drone_id}", "action": "move", "x": 10, "y": 5, "status": "SEARCHING"}}
  expected_output: >
    A JSON object matching the DroneIntent schema.
  agent: search_and_rescue_drone

returning_task:
  description: >
    PHASE: RETURNING Protocol for {drone_id}.
    1. SCAN: Call `thermal_scan("{drone_id}")`.
    2. NAVIGATION: Call `get_navigation_step` towards (9,9).
    3. TRANSITION: If at (9,9), status = CHARGING.
    4. FINAL ACTION: Output intent as valid JSON.
    
    CRITICAL: Your final answer MUST be a valid JSON object. Use double quotes.
    Example: {{"drone_id": "{drone_id}", "action": "move", "x": 9, "y": 9, "status": "CHARGING"}}
  expected_output: >
    A JSON object matching the DroneIntent schema.
  agent: search_and_rescue_drone

charging_task:
  description: >
    PHASE: CHARGING Protocol for {drone_id}.
    1. INTEL: Call `get_drone_context("{drone_id}")`.
    2. DECISION: If battery sufficient for next target, status = SEARCHING.
    3. FINAL ACTION: Output intent as valid JSON.
    
    CRITICAL: Your final answer MUST be a valid JSON object. Use double quotes.
    Example: {{"drone_id": "{drone_id}", "action": "wait", "x": 9, "y": 9, "status": "CHARGING"}}
  expected_output: >
    A JSON object matching the DroneIntent schema.
  agent: search_and_rescue_drone

idle_task:
  description: >
    PHASE: IDLE Protocol for {drone_id}.
    1. SEARCH: Call `get_claimable_pool()`.
    2. CLAIM: Call `claim_waypoints` and `check_task_viability`.
    3. DECISION: If viable, status = SEARCHING. If not viable, status = RETURNING.
    4. FINAL ACTION: Output intent as valid JSON.
    
    CRITICAL: Your final answer MUST be a valid JSON object. Use double quotes.
    Example: {{"drone_id": "{drone_id}", "action": "move", "x": 9, "y": 9, "status": "RETURNING"}}
  expected_output: >
    A JSON object matching the DroneIntent schema.
  agent: search_and_rescue_drone
