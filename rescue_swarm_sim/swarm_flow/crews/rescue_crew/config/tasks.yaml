dispatch_task:
  description: >
    PHASE: DISPATCH. 
    1. INTEL: Call `get_global_mission_state()` to find priority areas and drone positions.
    2. REASON: Identify IDLE drones and logical clusters of unrevealed buildings (or terrain if buildings are gone). Ensure no overlap with `assigned_to` cells.
    3. ALLOCATE: Call `allocate_drone_sector(drone_id, coordinates)` for each IDLE drone. coordinates is a set of coordinates that the drone are responsible for.
    4. ACTION: Output a JSON object mapping drone IDs to their new status.
    
    Example: {{"drone_id": "swarm", "action": "dispatch", "status": "COMPLETE"}}
  expected_output: >
    A JSON object indicating dispatch complete.
  agent: swarm_dispatcher

batch_drone_task:
  description: >
    PHASE: FLEET EXECUTION.
    You must process the following drones and determine their next move:
    {fleet_state}
    
    INSTRUCTIONS - For EACH drone in the list above, you MUST:
    1. Call `thermal_scan(drone_id)` to reveal cells and check for survivors if the drone is actively flying (SEARCHING or RETURNING).
    2. Call `get_drone_context(drone_id)` to get its exact live position, battery, thermal memory, and assigned sector.
    
    3. Based on its 'status', determine the target coordinate:
       - If SEARCHING: Check thermal memory first. If none, use `get_next_sector_step(drone_id)` that return the next coordinate of assigned sector to move to. If `sector_complete` is returned, status becomes IDLE. Check viability with `check_task_viability`. If not viable, status becomes RETURNING.
       - If RETURNING: Target is always (9, 9). If currently at (9, 9), status becomes CHARGING.
       - If CHARGING: Target is (9, 9). No movement. Decide whether to resume IDLE to ready for the next search task if battery allows. you may use `check_task_viability` to check if the drone is viable to search for a point.
       - If IDLE: Wait at current position. If `assigned_sector` was given, change status to SEARCHING.
       
    4. Navigational Action: If the drone needs to move to its target, call `get_navigation_step(drone_id, target_x, target_y)` to get the strict adjacent X and Y coordinates.
    
    CRITICAL RESTRICTION: Do NOT guess paths. You MUST use the MCP tools `get_navigation_step` or `get_next_sector_step` to calculate coordinates. You MUST output EXACTLY ONE intent for EACH drone in the provided list.
  expected_output: >
    A JSON object containing the 'intents' list populated with every processed drone's intent.
  agent: swarm_drone_operator
